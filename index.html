<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cYHBernews | Tu Periódico Tech Estático</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css?v=6">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
    (function () {
        var t = localStorage.getItem('cyhbernews-theme');
        document.documentElement.setAttribute('data-theme', (t === 'light' || t === 'dark') ? t : 'dark');
    })();
    </script>
</head>
<body>

    <div id="loader-overlay">
        <div class="loader-inner">
            <div class="loader-title" id="loader-scramble-title">cYHBernews</div>
            <div class="loader-status">
                <span class="loader-status-dot"></span>
                <span id="loader-status-text">Cargando noticias...</span>
            </div>
            <div class="loader-bar-track">
                <div class="loader-bar-fill" id="loader-bar"></div>
            </div>
        </div>
    </div>

    <header class="ios-header">
        <div class="ios-status-bar">
            <span class="ios-time" id="current-time">09:41</span>
            <div class="ios-icons">
                <button id="theme-toggle" class="theme-toggle-btn" aria-label="Cambiar tema" title="Cambiar tema (claro / oscuro)">
                    <i data-lucide="moon"></i>
                </button>
                <i data-lucide="signal" class="ios-icon"></i>
                <i data-lucide="wifi" class="ios-icon"></i>
                <i data-lucide="battery" class="ios-icon"></i>
            </div>
        </div>

        <div class="ios-nav-bar">
            <div class="nav-title-row">
                <h1 class="ios-title" id="scramble-title" aria-label="cYHBernews">cYHBernews</h1>
                <button class="nav-menu-button" id="nav-menu-button" type="button" aria-label="Abrir herramientas" aria-expanded="false" aria-controls="news-menu">
                    <i data-lucide="menu"></i>
                </button>
            </div>

            <div class="nav-controls-row">
                <nav class="ios-tabs" id="category-filters" aria-label="Categorías de noticias">
                    <button class="ios-tab active" data-category="all">Actualidad</button>
                    <button class="ios-tab" data-category="Ciberseguridad">Seguridad</button>
                    <button class="ios-tab" data-category="IA">IA</button>
                </nav>

                <!-- SEARCH DROPDOWN — anclado al botón hamburguesa -->
                <section class="news-menu" id="news-menu" aria-label="Herramientas de noticias">
                    <div class="toolbar">
                        <label class="search-box" for="news-search">
                            <i data-lucide="search"></i>
                            <input id="news-search" type="search" placeholder="Buscar por título, fuente o tema">
                        </label>
                        <label class="select-box" for="news-sort">
                            <i data-lucide="arrow-up-down"></i>
                            <select id="news-sort">
                                <option value="newest">Más recientes</option>
                                <option value="oldest">Más antiguas</option>
                                <option value="source">Por fuente</option>
                            </select>
                        </label>
                    </div>
                    <div class="results-row">
                        <span id="results-label">Cargando noticias</span>
                        <span class="menu-stats">
                            <span id="source-count">0</span> fuentes &bull;
                            <span id="total-count">0</span> noticias &bull;
                            act. <span id="latest-date">-</span>
                        </span>
                    </div>
                </section>
            </div>
        </div>
    </header>

    <main class="container">
        <section id="news-grid" class="news-feed">
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
        </section>

        <div class="pager" id="news-pager" hidden>
            <span id="pager-status">Mostrando noticias</span>
            <button type="button" id="load-more-news">
                <i data-lucide="plus"></i>
                Cargar más
            </button>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2026 cYHBernews &mdash; <span class="footer-tag">Noticias de Ciberseguridad</span></p>
        </div>
    </footer>

    <button id="back-to-top" class="back-to-top" aria-label="Volver al inicio">
        <i data-lucide="chevron-up"></i>
    </button>

    <div id="app-toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>

    <script src="app.js?v=6"></script>
</body>
</html>
