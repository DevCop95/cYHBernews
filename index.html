<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cYHBernews | Tu Periódico Tech Estático</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="loader-overlay">
        <div class="loader-inner">
            <div class="loader-logo" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" width="80" height="80">
                    <rect width="64" height="64" rx="14" fill="#0d1117"/>
                    <circle cx="14" cy="18" r="4" fill="#ff5f56"/>
                    <circle cx="26" cy="18" r="4" fill="#ffbd2e"/>
                    <circle cx="38" cy="18" r="4" fill="#27c93f"/>
                    <line x1="8" y1="27" x2="56" y2="27" stroke="#30363d" stroke-width="1.5"/>
                    <text x="10" y="50" font-family="monospace" font-size="22" font-weight="700" fill="#007aff">cY</text>
                    <rect x="42" y="33" width="10" height="16" rx="2" fill="#007aff" opacity="0.85" class="cursor-blink"/>
                </svg>
            </div>
            <div class="loader-title" id="loader-scramble-title">cYHBernews</div>
            <div class="loader-status">
                <span class="loader-status-dot"></span>
                <span id="loader-status-text">Initializing feed...</span>
            </div>
            <div class="loader-bar-track">
                <div class="loader-bar-fill" id="loader-bar"></div>
            </div>
        </div>
    </div>

    <div id="mesh-gradient"></div>

    <header class="ios-header">
        <div class="ios-status-bar">
            <span class="ios-time" id="current-time">09:41</span>
            <div class="ios-icons">
                <i data-lucide="signal" class="ios-icon"></i>
                <i data-lucide="wifi" class="ios-icon"></i>
                <i data-lucide="battery" class="ios-icon"></i>
            </div>
        </div>
        <div class="ios-nav-bar">
            <div class="nav-title-row">
                <h1 class="ios-title" id="scramble-title" aria-label="cYHBernews">cYHBernews</h1>
                <button class="nav-menu-button" id="nav-menu-button" type="button" aria-label="Abrir herramientas" aria-expanded="false" aria-controls="news-menu">
                    <i data-lucide="menu"></i>
                </button>
            </div>
            <div class="nav-controls-row">
                <nav class="ios-tabs" id="category-filters" aria-label="Categorías de noticias">
                    <button class="ios-tab active" data-category="all">Actualidad</button>
                    <button class="ios-tab" data-category="Ciberseguridad">Seguridad</button>
                    <button class="ios-tab" data-category="Tech">Tech</button>
                    <button class="ios-tab" data-category="IA">IA</button>
                </nav>
            </div>

            <section class="news-menu" id="news-menu" aria-label="Herramientas de noticias" style="display: none;">
                <div class="overview-strip">
                    <div>
                        <span id="total-count">0</span>
                        <small>noticias</small>
                    </div>
                    <div>
                        <span id="latest-date">-</span>
                        <small>última actualización</small>
                    </div>
                    <div>
                        <span id="source-count">0</span>
                        <small>fuentes</small>
                    </div>
                </div>

                <div class="toolbar">
                    <label class="search-box" for="news-search">
                        <i data-lucide="search"></i>
                        <input id="news-search" type="search" placeholder="Buscar por título, fuente o tema">
                    </label>
                    <label class="select-box" for="news-sort">
                        <i data-lucide="arrow-up-down"></i>
                        <select id="news-sort">
                            <option value="newest">Más recientes</option>
                            <option value="oldest">Más antiguas</option>
                            <option value="source">Por fuente</option>
                        </select>
                    </label>
                </div>

                <div class="results-row">
                    <span id="results-label">Cargando noticias</span>
                </div>
            </section>
        </div>
    </header>

    <main class="container">
        <section id="news-grid" class="news-feed">
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
        </section>

        <div class="pager" id="news-pager" hidden>
            <span id="pager-status">Mostrando noticias</span>
            <button type="button" id="load-more-news">
                <i data-lucide="plus"></i>
                Cargar más
            </button>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2026 cYHBernews.</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
